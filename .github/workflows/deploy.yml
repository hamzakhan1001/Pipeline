name: Build and Deploy Ghost Cloud latest code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: My-Environment

    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      ECS_CLUSTER: matomo
      TASK_DEF_NAME: myclient
      SERVICE_NAME: myclient-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install Docker 24.0.7
        run: |
          # Remove any old Docker versions
          sudo apt-get remove -y docker docker-engine docker.io containerd runc
          
          # Install dependencies
          sudo apt-get update
          sudo apt-get install -y \
            apt-transport-https \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          # Add Docker’s official GPG key
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/docker.gpg

          # Set up the stable repository
          echo "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          # Download and install Docker 24.0.7 directly
          curl -fsSL https://download.docker.com/linux/ubuntu/dists/$(lsb_release -cs)/stable/binary-amd64/docker-ce_24.0.7~3-0~ubuntu-$(lsb_release -cs)_amd64.deb -o docker-ce_24.0.7.deb
          sudo dpkg -i docker-ce_24.0.7.deb

          # Clean up the downloaded .deb file
          rm docker-ce_24.0.7.deb

          # Verify Docker version
          docker --version

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker -v
