name: Build and Deploy Ghost Cloud latest code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: My-Environment

    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      ECS_CLUSTER: matomo
      TASK_DEF_NAME: myclient
      SERVICE_NAME: myclient-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Uninstall existing Docker
        run: |
          sudo apt-get remove -y docker docker-engine docker.io containerd runc moby-cli moby-engine || true

      - name: Install Docker 24.0.7
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg lsb-release apt-transport-https

          # Download specific Docker 24.0.7 .deb packages
          curl -fsSL https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/docker-ce_24.0.7-1~ubuntu.22.04_amd64.deb -o docker-ce.deb
          curl -fsSL https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/docker-ce-cli_24.0.7-1~ubuntu.22.04_amd64.deb -o docker-ce-cli.deb
          curl -fsSL https://download.docker.com/linux/ubuntu/dists/jammy/pool/stable/amd64/containerd.io_1.6.21-1_amd64.deb -o containerd.io.deb

          # Install the downloaded packages
          sudo dpkg -i containerd.io.deb docker-ce-cli.deb docker-ce.deb

          sudo systemctl enable docker
          sudo systemctl start docker

      - name: Verify Docker version
        run: docker --version

      - name: Build and Push Docker Image
        run: |
          docker -v
