#-------------------------------------------------------------------------------
name: Build and Deploy Ghost Cloud latest code

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      ECS_CLUSTER: matomo
      TASK_DEF_NAME: myclient
      SERVICE_NAME: myclient-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install jq
        run: sudo apt-get install jq

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t pipeline:$IMAGE_TAG .
          docker tag pipeline:$IMAGE_TAG $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Update ECS Service for myclient-service
        run: |
          echo "Updating ECS Service: $SERVICE_NAME..."

          # Get current task definition
          TASK_DEF_JSON=$(aws ecs describe-task-definition --task-definition $TASK_DEF_NAME)

          # Replace image URL in task definition
          NEW_TASK_DEF=$(echo $TASK_DEF_JSON | jq --arg IMAGE "$ECR_REPOSITORY:$IMAGE_TAG" '
            .taskDefinition |
            {
              family: .family,
              executionRoleArn: .executionRoleArn,
              networkMode: .networkMode,
              containerDefinitions: (.containerDefinitions | map(if .name == "matomo" then .image = $IMAGE else . end)),
              requiresCompatibilities: .requiresCompatibilities,
              cpu: .cpu,
              memory: .memory
            }
          ')

          echo "$NEW_TASK_DEF" > new-task-def.json

          # Register new task definition
          aws ecs register-task-definition --cli-input-json file://new-task-def.json

          # Get new revision number
          REVISION=$(aws ecs describe-task-definition --task-definition $TASK_DEF_NAME --query 'taskDefinition.revision' --output text)

          # Update ECS service with new task definition revision
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $SERVICE_NAME \
            --task-definition "${TASK_DEF_NAME}:${REVISION}"

          echo "$SERVICE_NAME updated successfully."
